  <text x="650" y="100" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#e63946" text-anchor="middle" font-weight="bold">Statistics Engine</text>
  <text x="650" y="120" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Compute avg/min/max duration and quality</text>
  <text x="650" y="138" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle"> metrics</text>

  <!-- Arrow 1->3 -->
  <line x1="150" y1="160" x2="150" y2="195" stroke="#e63946" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow 2->4 -->
  <line x1="650" y1="160" x2="650" y2="195" stroke="#e63946" stroke-width="2"/>

  <!-- Node 3 (mid-left) -->
  <rect x="40" y="195" width="220" height="90" rx="10" fill="#161b22" stroke="#e63946" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="225" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#e63946" text-anchor="middle" font-weight="bold">Sleep Scorer</text>
  <text x="150" y="245" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">0-100 composite score with 4 weighted fa</text>
  <text x="150" y="263" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">ctors</text>

  <!-- Node 4 (mid-right) -->
  <rect x="540" y="195" width="220" height="90" rx="10" fill="#161b22" stroke="#e63946" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="225" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#e63946" text-anchor="middle" font-weight="bold">Pattern Analyzer</text>
  <text x="650" y="245" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Day-of-week, weekday/weekend, and trend </text>
  <text x="650" y="263" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">analysis</text>

  <!-- Horizontal connector -->
  <line x1="260" y1="240" x2="540" y2="240" stroke="#e63946" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="235" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#e63946" text-anchor="middle">data flow</text>

  <!-- Arrows down -->
  <line x1="150" y1="285" x2="150" y2="315" stroke="#e63946" stroke-width="2"/>
  <line x1="650" y1="285" x2="650" y2="315" stroke="#e63946" stroke-width="2"/>

  <!-- Node 5 (bottom-left) -->
  <rect x="40" y="315" width="220" height="70" rx="10" fill="#e63946" opacity="0.1" stroke="#e63946" stroke-width="1"/>
  <text x="150" y="345" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#e63946" text-anchor="middle" font-weight="bold">LLM Advisor</text>
  <text x="150" y="365" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">AI-powered personalized sleep recommenda</text>

  <!-- Node 6 (bottom-right) -->
  <rect x="540" y="315" width="220" height="70" rx="10" fill="#e63946" opacity="0.1" stroke="#e63946" stroke-width="1"/>
  <text x="650" y="345" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#e63946" text-anchor="middle" font-weight="bold">Rich Output</text>
  <text x="650" y="365" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Formatted reports with scores, charts, a</text>

  <!-- Connecting arrows (vertical) -->
  <polygon points="147,193 150,185 153,193" fill="#e63946"/>
  <polygon points="647,193 650,185 653,193" fill="#e63946"/>
  <polygon points="147,313 150,305 153,313" fill="#e63946"/>
  <polygon points="647,313 650,305 653,313" fill="#e63946"/>
</svg>