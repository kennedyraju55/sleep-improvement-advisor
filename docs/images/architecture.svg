<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="archAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c1121f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#archBg)" rx="12"/>
  <text x="400" y="35" font-family="Segoe UI,Arial,sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">Architecture Overview</text>
  <rect x="2" y="45" width="796" height="3" fill="url(#archAccent)" opacity="0.5"/>

  <!-- Node 1 (top-left) -->
  <rect x="40" y="70" width="220" height="90" rx="10" fill="#161b22" stroke="#e63946" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="100" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#e63946" text-anchor="middle" font-weight="bold">Sleep Data Input</text>
  <text x="150" y="120" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">CSV sleep logs or assessment questionnai</text>
  <text x="150" y="138" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">re responses</text>

  <!-- Node 2 (top-right) -->
